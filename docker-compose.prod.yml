services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mindcanvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindcanvas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindcanvas"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mindcanvas-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindcanvas-backend
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/mindcanvas
      BACKEND_PORT: "8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mindcanvas-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: mindcanvas-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mindcanvas-net

networks:
  mindcanvas-net:
    driver: bridge

volumes:
  pgdata:
